schema: admin-dashboard

context: |
  Project: VietSale Pro v7
  Tech stack: React SPA + Vite + TypeScript + Supabase
  Project path: C:/Users/SUACAUBA/Downloads/Project/vietsale-pro-v7
  No git repository present. Backups are created by copying the project folder.
  Build / verification:
    - Typecheck: npm run lint (runs tsc --noEmit)
    - Production build: npm run build
    - Dev server: npm run dev
  Admin dashboard conventions:
    - Reference KE_HOACH_ADMIN_DASHBOARD.md and KE_HOACH_ADMIN_DASHBOARD_SUB_PHASE.md at memory-zone/KE_HOACH/Admin_dashboard/.
    - Each phase is split into sub-phases with their own acceptance criteria.
    - System-admin pages, RPCs, Supabase Edge Functions, service layer, billing/invoicing, support tickets, security, observability, and long-term operations may be touched as required by the plan.
    - After each sub-phase run npm run lint. After each major phase run npm run build and manual test one flow.
    - Backup naming convention: vietsale-pro-v7_backup_admin_dashboard_<phase>_<YYYYMMDD_HHMMSS>

rules:
  proposal:
    - Include explicit scope, non-goals, and rollback plan
    - Identify affected files, service functions, RPCs, database tables, and RLS policies
    - Reference memory-zone/KE_HOACH/Admin_dashboard/KE_HOACH_ADMIN_DASHBOARD_SUB_PHASE.md
  specs:
    - Use ADDED/MODIFIED/REMOVED delta sections
    - Each requirement MUST have at least one GIVEN/WHEN/THEN scenario
    - Focus on observable behavior and data contracts, not implementation details
  design:
    - Document decisions about database schema, RPCs, service/RPC changes, data mapping, validation, frontend pages, and Edge Functions
    - Include risk level and mitigation for each sub-phase
  tasks:
    - Group tasks under numbered sub-phase headings (e.g., 1. Sub-phase A, 2. Sub-phase B, 3. Verification)
    - Each task must be a checkbox: - [ ] X.Y Task description
    - Include acceptance criteria checkboxes, lint/build verification, and manual test steps
    - Keep each task completable in one session
  review:
    - Verify acceptance criteria from KE_HOACH_ADMIN_DASHBOARD_SUB_PHASE.md are covered
    - Verify intended database schema, RPCs, service layer, and frontend changes are documented
    - Verify dead-code list is complete
  rollback:
    - Provide exact backup/restore command for Windows PowerShell
    - List files and database migrations that can be restored independently if safe
  handoff:
    - Summarize what was done, what is verified, and the next sub-phase to start
    - Note any blockers or decisions that need to be made in the next session
