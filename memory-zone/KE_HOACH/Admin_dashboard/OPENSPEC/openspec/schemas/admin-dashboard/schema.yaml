name: admin-dashboard
version: 1
description: >
  OpenSpec workflow tailored for the VietSale Pro v7 admin dashboard upgrade.
  proposal → specs → design → review → rollback → tasks → handoff. Extra
  governance artifacts (review, rollback, handoff) help enforce the detailed
  KE_HOACH_ADMIN_DASHBOARD_SUB_PHASE.md acceptance criteria, risk level,
  and rollback plan for dashboard pages, system-admin RPCs, Supabase Edge
  Functions, service layer, billing/invoicing, support tickets, security,
  observability, and long-term operations.
artifacts:
  - id: proposal
    generates: proposal.md
    description: Intent, scope, and affected files for this phase
    template: proposal.md
    instruction: >
      Create the proposal document that establishes WHY this phase is needed.


      Sections:

      - **Why**: 1-2 sentences on the problem or opportunity. Why this phase
      now?

      - **What Changes**: Bullet list of concrete changes (files, components,
      RPCs, service functions, types).
        Mark breaking changes with **BREAKING**.
      - **Scope / Non-Goals**: What is in scope and explicitly out of scope.

      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List new behavior or data capabilities. Each becomes a new `specs/<name>/spec.md`.
        - **Modified Capabilities**: Existing capabilities whose REQUIREMENTS are changing. Each needs a delta spec file.
      - **Impact**: Affected files, dead code, feature flags, database RPCs,
      service layer, and verification steps.

      - **Rollback**: One-line summary of rollback strategy (expanded in
      rollback.md).


      Keep it concise (1 page). Focus on the "why" not the "how".
    requires: []
  - id: specs
    generates: specs/**/*.md
    description: Delta specifications for this phase
    template: spec.md
    instruction: >
      Create specification files that define WHAT the system should do after
      this phase.


      Create one spec file per capability listed in the proposal.

      - New capabilities: use the exact kebab-case name from the proposal
      (specs/<capability>/spec.md).

      - Modified capabilities: use the existing spec folder name from
      openspec/specs/<capability>/ when creating the delta spec at
      specs/<capability>/spec.md.


      Delta operations (use ## headers):

      - **ADDED Requirements**: New capabilities

      - **MODIFIED Requirements**: Changed behavior - MUST include full updated
      content

      - **REMOVED Requirements**: Deprecated features - MUST include **Reason**
      and **Migration**

      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format


      Format requirements:

      - Each requirement: `### Requirement: <name>` followed by description

      - Use SHALL/MUST for normative requirements (avoid should/may)

      - Each scenario: `#### Scenario: <name>` with GIVEN/WHEN/THEN format

      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`).

      - Every requirement MUST have at least one scenario.

      - Focus on observable behavior and data contracts, not implementation details.
    requires:
      - proposal
  - id: design
    generates: design.md
    description: Technical design and decisions for this phase
    template: design.md
    instruction: >
      Create the design document that explains HOW to implement this phase.


      Sections:

      - **Context**: Current state of relevant files, previous phase handoff
      notes.

      - **Goals / Non-Goals**: What this phase achieves and explicitly excludes.

      - **Decisions**: Key technical choices with rationale (why X over Y?).
        Include state management, service/RPC changes, data mapping, validation, and any prop changes.
      - **Risks / Trade-offs**: Format: [Risk level] Risk description →
      Mitigation.

      - **Migration / Rollback**: How to deploy this phase and how to undo it.

      - **Open Questions**: Outstanding decisions or unknowns.


      Focus on architecture and approach, not line-by-line implementation.
    requires:
      - proposal
  - id: review
    generates: review.md
    description: Pre-implementation review checklist
    template: review.md
    instruction: >
      Create a review checklist that validates the plan before implementation
      begins.


      Sections:

      - **Plan Coverage**: Verify every sub-phase from KE_HOACH_ADMIN_DASHBOARD_SUB_PHASE.md is represented in tasks.

      - **File List**: List files to modify, files to delete, and feature flags
      to remove.

      - **Guardrails**: Confirm which business logic, types.ts, and Supabase RPCs
      are intentionally touched.

      - **Acceptance Criteria**: Map each KE_HOACH_ADMIN_DASHBOARD_SUB_PHASE.md acceptance criterion to a task
      or spec scenario.

      - **Verification Steps**: lint, build, manual test flow.


      This artifact is optional but recommended for high-risk phases.
    requires:
      - specs
      - design
  - id: rollback
    generates: rollback.md
    description: Rollback plan for this phase
    template: rollback.md
    instruction: >
      Create a rollback plan for this phase.


      Sections:

      - **Backup Command**: Exact PowerShell command to copy the project folder
      before starting.

      - **Files to Restore**: List of files that can be restored from backup if
      the phase fails.

      - **Rollback Steps**: Numbered steps to revert the project to pre-phase
      state.

      - **When to Rollback**: Criteria that trigger a rollback (e.g., build
      fails, manual test fails, data loss risk).

      - **Post-Rollback Verification**: Steps to confirm rollback succeeded.
    requires:
      - design
  - id: tasks
    generates: tasks.md
    description: Implementation checklist for this phase
    template: tasks.md
    instruction: >
      Create the task list that breaks down this phase's implementation work.


      **IMPORTANT: Follow the template below exactly.** The apply phase parses
      checkbox format.


      Guidelines:

      - Group tasks under ## numbered headings (e.g., 1. Audit, 2. Layout, 3.
      Cleanup).

      - Each task MUST be a checkbox: `- [ ] X.Y Task description`

      - Each task should be small enough to complete in one session.

      - Order tasks by dependency.

      - Include explicit acceptance criteria checkboxes under a dedicated
      section.

      - Include verification steps: `npm run lint`, `npm run build`, manual
      test.

      - Include backup step as task 0.1.


      Reference specs for what needs to be built, design for how to build it.
    requires:
      - specs
      - design
      - review
      - rollback
  - id: handoff
    generates: handoff.md
    description: Session handoff summary for the next phase
    template: handoff.md
    instruction: >
      Create a handoff document summarizing what was completed in this phase.


      Sections:

      - **What Was Done**: Completed tasks and key decisions.

      - **What Was Verified**: lint, build, manual test results.

      - **Next Phase**: The next OpenSpec change to start.

      - **Blockers / Decisions**: Anything the next session needs to know.

      - **Backup Location**: Path to the backup created before this phase.


      This artifact is written after the phase is archived and before starting
      the next phase.
    requires:
      - tasks
apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: >
    Read context files, work through pending tasks in tasks.md, mark complete as
    you go.

    Pause if you hit blockers or need clarification.

    After all tasks are done, run /opsx:verify and /opsx:archive.
